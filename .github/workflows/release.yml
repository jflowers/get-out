name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      has_signing_secrets: ${{ steps.check-secrets.outputs.has_secrets }}
    steps:
      - name: Check signing secrets
        id: check-secrets
        run: |
          if [ -n "$MACOS_SIGN_P12" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Set up Go
        uses: actions/setup-go@f111f3307d8850f501ac008e886eec1fd1932a34 # v5.3.0
        with:
          go-version: '1.25'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v6.1.0
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  sign-macos:
    runs-on: macos-latest
    needs: release
    if: ${{ needs.release.outputs.has_signing_secrets == 'true' }}
    timeout-minutes: 30
    steps:
      - name: Import certificate into Keychain
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo -n "$MACOS_SIGN_P12" | base64 --decode -o $RUNNER_TEMP/cert.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $RUNNER_TEMP/cert.p12 -P "$MACOS_SIGN_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
        env:
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}

      - name: Prepare notary key
        run: |
          echo -n "$MACOS_NOTARY_KEY" | base64 --decode -o $RUNNER_TEMP/notary_key.p8
        env:
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}

      - name: Download darwin archives
        run: |
          gh release download "${GITHUB_REF_NAME}" --repo "$GITHUB_REPOSITORY" --pattern "get-out_*_darwin_*.tar.gz" --dir ./artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign and notarize
        run: |
          mkdir -p ./signed
          for archive in ./artifacts/get-out_*_darwin_*.tar.gz; do
            echo "==> Processing $(basename "$archive")"
            workdir=$(mktemp -d)

            # Extract binary
            tar -xzf "$archive" -C "$workdir"

            # Sign with codesign
            codesign --force --timestamp --options runtime \
              --sign "Developer ID Application: John Flowers (PGFWLVZX55)" \
              "$workdir/get-out"

            # Verify signature
            codesign --verify --verbose=2 "$workdir/get-out"

            # Zip for notarytool (requires .zip, not .tar.gz)
            ditto -c -k "$workdir/get-out" "$workdir/get-out.zip"

            # Submit for notarization and wait
            xcrun notarytool submit "$workdir/get-out.zip" \
              --key "$RUNNER_TEMP/notary_key.p8" \
              --key-id "$MACOS_NOTARY_KEY_ID" \
              --issuer "$MACOS_NOTARY_ISSUER_ID" \
              --wait --timeout 20m

            # Re-archive all contents (signed binary + man page + LICENSE) with original archive name
            tar -czf "./signed/$(basename "$archive")" -C "$workdir" get-out LICENSE man

            rm -rf "$workdir"
            echo "==> Done: $(basename "$archive")"
          done
        env:
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}

      - name: Replace release assets and update checksums
        run: |
          # Upload signed darwin archives (replaces unsigned)
          gh release upload "${GITHUB_REF_NAME}" --repo "$GITHUB_REPOSITORY" ./signed/*.tar.gz --clobber

          # Download existing checksums
          gh release download "${GITHUB_REF_NAME}" --repo "$GITHUB_REPOSITORY" --pattern "checksums.txt" --dir ./

          # Remove darwin lines from checksums (keep linux and other lines)
          grep -v darwin checksums.txt > checksums_updated.txt || true

          # Compute SHA256 for each signed darwin archive
          for archive in ./signed/*.tar.gz; do
            shasum -a 256 "$archive" | sed 's|./signed/||' >> checksums_updated.txt
          done

          # Replace checksums file
          mv checksums_updated.txt checksums.txt
          gh release upload "${GITHUB_REF_NAME}" --repo "$GITHUB_REPOSITORY" checksums.txt --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew cask checksums
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          # Compute signed checksums
          ARM64_SHA=$(shasum -a 256 "./signed/get-out_${VERSION}_darwin_arm64.tar.gz" | awk '{print $1}')
          AMD64_SHA=$(shasum -a 256 "./signed/get-out_${VERSION}_darwin_amd64.tar.gz" | awk '{print $1}')

          echo "darwin_arm64 SHA256: $ARM64_SHA"
          echo "darwin_amd64 SHA256: $AMD64_SHA"

          # Clone the Homebrew tap
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/jflowers/homebrew-tools.git" tap
          cd tap

          CASK_FILE="Casks/get-out.rb"
          if [ ! -f "$CASK_FILE" ]; then
            echo "::error::Cask file not found: $CASK_FILE"
            exit 1
          fi

          # Update darwin checksums in the cask file.
          # Patch only darwin SHA256 values; linux lines (set by GoReleaser) are preserved.
          awk -v amd64="$AMD64_SHA" -v arm64="$ARM64_SHA" '
            /darwin_amd64/ { found_amd64=1 }
            /darwin_arm64/ { found_arm64=1 }
            /sha256/ && found_amd64 {
              sub(/sha256 "[^"]*"/, "sha256 \"" amd64 "\"")
              found_amd64=0
            }
            /sha256/ && found_arm64 {
              sub(/sha256 "[^"]*"/, "sha256 \"" arm64 "\"")
              found_arm64=0
            }
            { print }
          ' "$CASK_FILE" > "${CASK_FILE}.tmp"
          mv "${CASK_FILE}.tmp" "$CASK_FILE"

          # Commit and push
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$CASK_FILE"
          git diff --cached --quiet && { echo "No checksum changes needed"; exit 0; }
          git commit -m "Update macOS checksums for get-out v${VERSION} (post-signing)"
          git push
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
