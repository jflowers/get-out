version: 2

builds:
  - main: ./cmd/get-out
    binary: get-out
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}} -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*
      - man/get-out.1

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  use: github
  groups:
    - title: "Features"
      regexp: '^.*?feat(\(.+\))?\!?:.+$'
      order: 0
    - title: "Bug Fixes"
      regexp: '^.*?fix(\(.+\))?\!?:.+$'
      order: 1
    - title: "Documentation"
      regexp: '^.*?docs(\(.+\))?\!?:.+$'
      order: 2
    - title: "Other"
      order: 999

homebrew_casks:
  - name: get-out
    directory: Casks
    repository:
      owner: jflowers
      name: homebrew-tools
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: https://github.com/jflowers/get-out
    description: >-
      Export Slack messages (DMs, groups, channels) to organized Google Docs
    binaries:
      - get-out
    manpages:
      - man/get-out.1
    skip_upload: auto
    commit_msg_template: >-
      Brew cask update for {{ .ProjectName }} version {{ .Tag }}

release:
  github:
    owner: jflowers
    name: get-out
  prerelease: auto
  make_latest: true
